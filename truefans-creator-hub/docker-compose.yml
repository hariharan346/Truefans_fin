version: '3.8'

services:
  backend:
    build: ./backend
    image: ${REGISTRY_USER:-your-dockerhub-username}/truefans-backend:latest
    container_name: tf-backend
    restart: always
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/truefans
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - mongodb
    volumes:
      - tf-uploads:/app/uploads
    networks:
      - tf-network

  nginx:
    build: .
    image: ${REGISTRY_USER:-your-dockerhub-username}/truefans-frontend:latest
    container_name: tf-nginx
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - tf-network

  mongodb:
    image: mongo:latest
    container_name: tf-mongodb
    restart: always
    environment:
      - MONGO_INITDB_DATABASE=truefans
    volumes:
      - tf-mongodb-data:/data/db
    networks:
      - tf-network

networks:
  tf-network:
    driver: bridge

volumes:
  tf-uploads:
  tf-mongodb-data:
